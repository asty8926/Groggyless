<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groggyless - Stop groggyness when waking up</title>

    <link
      rel="shortcut icon"
      href="../assets/favicon_full.png"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="./style.css" />
    <script src="../dist/app.js" defer></script>
  </head>
  <body>
    <header class="header-container">
      <img
        class="favicon"
        src="../assets/favicon_full.png"
        alt="A boy smiling while feeling rested, meaning he's groggyless."
      />
      <div class="header-text-container">
        <h1>Groggyless</h1>
        <h2>Wake up feeling rested</h2>
      </div>
    </header>

    <main>
      <div class="form-container">
        <div class="form-item">
          <label for="startDropdown">Bed time</label>
          <select name="startDropdown" id="startDropdown" class="dropdown">
            <!-- Dynamically generated in JavaScript -->
          </select>
        </div>

        <div class="form-item">
          <label for="endDropdown">Wake time</label>
          <select name="endDropdown" id="endDropdown" class="dropdown">
            <!-- Dynamically generated in JavaScript -->
          </select>
        </div>
      </div>
      <div class="output-container"></div>
    </main>

    <footer>
      <p class="footer-text">
        Created with ♥ for your sleep by
        <a href="https://github.com/asty8926" class="github-link">Asty'</a>
      </p>
    </footer>
  </body>
</html>
